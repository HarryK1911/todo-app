<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f2f2f5;
      --border: #e0e0e6;
      --text: #1a1a2e;
      --text2: #6b6b80;
      --accent: #5b4cf5;
      --accent-light: #ede9ff;
      --danger: #ff4d6d;
      --done: #a0a0b0;
      --shadow: 0 4px 24px rgba(91,76,245,.08);
      --radius: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f17;
        --surface: #1a1a28;
        --surface2: #22223a;
        --border: #2e2e4a;
        --text: #e8e8f0;
        --text2: #7070a0;
        --accent-light: #2a2460;
        --shadow: 0 4px 24px rgba(0,0,0,.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .app { width: 100%; max-width: 560px; }

    /* Header */
    header { margin-bottom: 32px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
    h1 span { color: var(--accent); }
    .count-badge {
      font-size: 0.78rem; font-weight: 700; padding: 4px 10px;
      background: var(--accent-light); color: var(--accent);
      border-radius: 20px; letter-spacing: 0.02em;
    }

    /* Input area */
    .input-row {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .todo-input {
      flex: 1; padding: 14px 18px; font-size: 1rem;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      transition: border-color .2s, box-shadow .2s; outline: none;
    }
    .todo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91,76,245,.12);
    }
    .todo-input::placeholder { color: var(--text2); }
    .add-btn {
      padding: 14px 22px; font-size: 1rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: .88; }
    .add-btn:active { transform: scale(.96); }

    /* Filter tabs */
    .filter-row {
      display: flex; gap: 6px; margin-bottom: 16px;
      background: var(--surface2); padding: 4px;
      border-radius: calc(var(--radius) - 2px);
    }
    .filter-btn {
      flex: 1; padding: 8px 0; font-size: 0.85rem; font-weight: 600;
      background: transparent; border: none; border-radius: calc(var(--radius) - 6px);
      color: var(--text2); cursor: pointer; transition: all .2s;
    }
    .filter-btn.active {
      background: var(--surface); color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* Todo list */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 2px solid transparent;
      border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow);
      transition: border-color .2s, box-shadow .2s, opacity .2s;
      cursor: grab;
      animation: slideIn .18s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item:hover { border-color: var(--border); }
    .todo-item.dragging { opacity: .4; cursor: grabbing; }
    .todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,76,245,.15); }

    /* Checkbox */
    .check-wrap { flex-shrink: 0; position: relative; width: 22px; height: 22px; }
    .check-wrap input[type="checkbox"] { opacity: 0; position: absolute; inset: 0; cursor: pointer; z-index: 1; }
    .checkmark {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      pointer-events: none;
    }
    .check-wrap input:checked ~ .checkmark {
      background: var(--accent); border-color: var(--accent);
    }
    .checkmark svg { display: none; width: 13px; height: 13px; stroke: #fff; stroke-width: 2.5; fill: none; }
    .check-wrap input:checked ~ .checkmark svg { display: block; }

    /* Text */
    .todo-text {
      flex: 1; font-size: 0.97rem; line-height: 1.4;
      word-break: break-all; cursor: text;
      color: var(--text);
      transition: color .2s;
    }
    .todo-item.completed .todo-text {
      color: var(--done);
      text-decoration: line-through;
      text-decoration-color: var(--done);
    }

    /* Edit input */
    .edit-input {
      flex: 1; font-size: 0.97rem; padding: 2px 6px;
      background: var(--surface2); border: 2px solid var(--accent);
      border-radius: 6px; color: var(--text); outline: none;
    }

    /* Delete button */
    .delete-btn {
      flex-shrink: 0; background: transparent; border: none;
      color: var(--text2); cursor: pointer; padding: 4px;
      border-radius: 6px; display: flex; align-items: center;
      opacity: 0; transition: opacity .15s, color .15s, background .15s;
    }
    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); background: rgba(255,77,109,.08); }

    /* Drag handle */
    .drag-handle {
      flex-shrink: 0; color: var(--border); cursor: grab;
      opacity: 0; transition: opacity .15s;
      display: flex; align-items: center;
    }
    .todo-item:hover .drag-handle { opacity: 1; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text2);
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* Footer */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 20px; padding: 0 4px;
      font-size: 0.82rem; color: var(--text2);
      min-height: 28px;
    }
    .clear-btn {
      background: transparent; border: none; color: var(--text2);
      cursor: pointer; font-size: 0.82rem; padding: 4px 8px;
      border-radius: 6px; transition: color .15s, background .15s;
    }
    .clear-btn:hover { color: var(--danger); background: rgba(255,77,109,.08); }
    .clear-btn:disabled { opacity: 0; pointer-events: none; }

    /* Hint */
    .hint {
      text-align: center; margin-top: 32px;
      font-size: 0.78rem; color: var(--text2); opacity: .6;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-row">
      <h1>할 일 <span>목록</span></h1>
      <span class="count-badge" id="count-badge">0 개</span>
    </div>
  </header>

  <div class="input-row">
    <input class="todo-input" id="todo-input" type="text" placeholder="새 할 일을 입력하세요..." autocomplete="off" />
    <button class="add-btn" id="add-btn">추가</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">진행 중</button>
    <button class="filter-btn" data-filter="completed">완료</button>
  </div>

  <ul class="todo-list" id="todo-list"></ul>

  <div class="footer">
    <span id="footer-info"></span>
    <button class="clear-btn" id="clear-btn" disabled>완료 항목 삭제</button>
  </div>

  <p class="hint">더블클릭으로 수정 &nbsp;·&nbsp; 드래그로 순서 변경</p>
</div>

<script>
  // --- State ---
  let todos = JSON.parse(localStorage.getItem('todos_v1') || '[]');
  let filter = 'all';
  let editingId = null;
  let dragSrcId = null;

  function save() {
    localStorage.setItem('todos_v1', JSON.stringify(todos));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // --- Render ---
  function render() {
    const list = document.getElementById('todo-list');
    const visible = todos.filter(t => {
      if (filter === 'active') return !t.completed;
      if (filter === 'completed') return t.completed;
      return true;
    });

    const activeCount = todos.filter(t => !t.completed).length;
    const completedCount = todos.filter(t => t.completed).length;

    // Badge
    document.getElementById('count-badge').textContent = `${activeCount} 개`;

    // Footer
    const fi = document.getElementById('footer-info');
    if (todos.length === 0) {
      fi.textContent = '';
    } else {
      fi.textContent = `${activeCount}개 남음`;
    }

    // Clear button
    const cb = document.getElementById('clear-btn');
    cb.disabled = completedCount === 0;

    // Empty state
    if (visible.length === 0) {
      const msgs = {
        all: ['📋', '할 일이 없습니다.'],
        active: ['✅', '진행 중인 항목이 없습니다.'],
        completed: ['🎯', '완료된 항목이 없습니다.'],
      };
      const [icon, msg] = msgs[filter];
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
      return;
    }

    list.innerHTML = '';
    visible.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.completed ? ' completed' : '');
      li.dataset.id = todo.id;
      li.draggable = true;

      if (editingId === todo.id) {
        li.innerHTML = `
          <span class="drag-handle" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <circle cx="4" cy="3" r="1.2"/><circle cx="10" cy="3" r="1.2"/>
              <circle cx="4" cy="7" r="1.2"/><circle cx="10" cy="7" r="1.2"/>
              <circle cx="4" cy="11" r="1.2"/><circle cx="10" cy="11" r="1.2"/>
            </svg>
          </span>
          <input class="edit-input" id="edit-input" type="text" value="${escHtml(todo.text)}" />
          <button class="delete-btn" data-id="${todo.id}" aria-label="삭제" style="opacity:1">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        `;
      } else {
        li.innerHTML = `
          <span class="drag-handle" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <circle cx="4" cy="3" r="1.2"/><circle cx="10" cy="3" r="1.2"/>
              <circle cx="4" cy="7" r="1.2"/><circle cx="10" cy="7" r="1.2"/>
              <circle cx="4" cy="11" r="1.2"/><circle cx="10" cy="11" r="1.2"/>
            </svg>
          </span>
          <label class="check-wrap">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} data-id="${todo.id}" />
            <span class="checkmark">
              <svg viewBox="0 0 13 10"><polyline points="1,5 5,9 12,1"/></svg>
            </span>
          </label>
          <span class="todo-text" data-id="${todo.id}">${escHtml(todo.text)}</span>
          <button class="delete-btn" data-id="${todo.id}" aria-label="삭제">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        `;
      }

      // Drag events
      li.addEventListener('dragstart', onDragStart);
      li.addEventListener('dragover', onDragOver);
      li.addEventListener('drop', onDrop);
      li.addEventListener('dragend', onDragEnd);
      li.addEventListener('dragleave', onDragLeave);

      list.appendChild(li);
    });

    // Focus edit input
    if (editingId) {
      const inp = document.getElementById('edit-input');
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Actions ---
  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({ id: genId(), text, completed: false });
    save();
    render();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.completed = !t.completed; save(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    if (editingId === id) editingId = null;
    save();
    render();
  }

  function startEdit(id) {
    editingId = id;
    render();
  }

  function commitEdit(id) {
    const inp = document.getElementById('edit-input');
    if (!inp) return;
    const val = inp.value.trim();
    if (val) {
      const t = todos.find(t => t.id === id);
      if (t) t.text = val;
    } else {
      deleteTodo(id);
    }
    editingId = null;
    save();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    save();
    render();
  }

  // --- Event delegation ---
  document.getElementById('add-btn').addEventListener('click', () => {
    const inp = document.getElementById('todo-input');
    addTodo(inp.value);
    inp.value = '';
    inp.focus();
  });

  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const inp = e.target;
      addTodo(inp.value);
      inp.value = '';
    }
  });

  document.getElementById('clear-btn').addEventListener('click', clearCompleted);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('todo-list').addEventListener('change', e => {
    if (e.target.type === 'checkbox') toggleTodo(e.target.dataset.id);
  });

  document.getElementById('todo-list').addEventListener('click', e => {
    const del = e.target.closest('.delete-btn');
    if (del) deleteTodo(del.dataset.id);
  });

  document.getElementById('todo-list').addEventListener('dblclick', e => {
    const text = e.target.closest('.todo-text');
    if (text) startEdit(text.dataset.id);
  });

  document.getElementById('todo-list').addEventListener('keydown', e => {
    if (editingId) {
      if (e.key === 'Enter') commitEdit(editingId);
      if (e.key === 'Escape') { editingId = null; render(); }
    }
  });

  document.getElementById('todo-list').addEventListener('blur', e => {
    if (editingId && e.target.classList.contains('edit-input')) {
      commitEdit(editingId);
    }
  }, true);

  // --- Drag & Drop ---
  function onDragStart(e) {
    dragSrcId = e.currentTarget.dataset.id;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.currentTarget;
    if (item.dataset.id !== dragSrcId) item.classList.add('drag-over');
  }

  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    const targetId = e.currentTarget.dataset.id;
    e.currentTarget.classList.remove('drag-over');
    if (!dragSrcId || dragSrcId === targetId) return;
    const srcIdx = todos.findIndex(t => t.id === dragSrcId);
    const tgtIdx = todos.findIndex(t => t.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = todos.splice(srcIdx, 1);
    todos.splice(tgtIdx, 0, moved);
    save();
    render();
  }

  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
    dragSrcId = null;
  }

  // --- Init ---
  render();
</script>
</body>
</html>
